<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini GeoGuessr</title>

<!-- Leaflet CSS -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #map {
    flex: 1;
  }

  #controls {
    padding: 15px;
    background: white;
    text-align: center;
    border-top: 2px solid #ddd;
  }

  #guessBtn {
    background: #ff4757;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
  }

  #guessBtn:hover {
    background: #ff6b81;
  }
</style>
</head>

<body>

<div id="map"></div>

<div id="controls">
  <button id="guessBtn">Guess</button>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Predefined list of random world locations
const locations = [
  { name: "Paris, France", coords: [48.8566, 2.3522] },
  { name: "Tokyo, Japan", coords: [35.6895, 139.6917] },
  { name: "Sydney, Australia", coords: [-33.8688, 151.2093] },
  { name: "New York, USA", coords: [40.7128, -74.0060] },
  { name: "Rio de Janeiro, Brazil", coords: [-22.9068, -43.1729] },
  { name: "Cape Town, South Africa", coords: [-33.9249, 18.4241] }
];

// Pick a random location
const chosen = locations[Math.floor(Math.random() * locations.length)];

// Initialize map (start zoomed in so the user can't see the world)
const map = L.map("map", {
  zoomControl: false
}).setView([0, 0], 2);

// Add tile layer
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
}).addTo(map);

// Hidden marker for the correct answer
const answerMarker = L.marker(chosen.coords);

// When user clicks "Guess", reveal the correct location
document.getElementById("guessBtn").addEventListener("click", () => {
  answerMarker.addTo(map).bindPopup(`Correct location:<br><b>${chosen.name}</b>`).openPopup();
  map.setView(chosen.coords, 10);
});
</script>

</body>
</html>
