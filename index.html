<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mini GeoGuessr – Google Street View + Leaflet</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }

        #streetview {
            width: 100%;
            height: 60vh;
        }

        #map {
            width: 100%;
            height: 40vh;
        }

        #controls {
            padding: 10px;
            text-align: center;
            background: white;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            background: #ff4757;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #e84118;
        }

        #result {
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div id="streetview"></div>
<div id="map"></div>

<div id="controls">
    <button id="guessBtn">Make Guess</button>
    <div id="result"></div>
    <button id="playAgainBtn" style="display:none;">Play Again</button>
</div>

<!-- Google Maps JS API -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBQMGy8p5whzhzPGIY1RsoGXL8w8aQmgl0"></script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Predefined random locations
    const locations = [
        { lat: 40.6892, lng: -74.0445 },   // Statue of Liberty
        { lat: 48.8584, lng: 2.2945 },     // Eiffel Tower
        { lat: 35.6586, lng: 139.7454 },   // Tokyo Tower
        { lat: -33.8568, lng: 151.2153 },  // Sydney Opera House
        { lat: 51.5007, lng: -0.1246 },    // Big Ben
        { lat: -22.9519, lng: -43.2105 }   // Christ the Redeemer
    ];

    let correctLocation;
    let guessMarker;
    let correctMarker;

    // Initialize Street View
    function loadStreetView() {
        correctLocation = locations[Math.floor(Math.random() * locations.length)];

        new google.maps.StreetViewPanorama(
            document.getElementById("streetview"),
            {
                position: correctLocation,
                pov: { heading: 0, pitch: 0 },
                zoom: 1
            }
        );
    }

    // Initialize Leaflet map
    const map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    map.on("click", function (e) {
        if (guessMarker) map.removeLayer(guessMarker);
        guessMarker = L.marker(e.latlng).addTo(map);
    });

    // Haversine distance
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;

        const a =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) *
            Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);

        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    document.getElementById("guessBtn").onclick = function () {
        if (!guessMarker) {
            alert("Click on the map to make a guess");
            return;
        }

        const guess = guessMarker.getLatLng();
        const dist = getDistance(
            guess.lat, guess.lng,
            correctLocation.lat, correctLocation.lng
        );

        if (correctMarker) map.removeLayer(correctMarker);
        correctMarker = L.marker(correctLocation).addTo(map);

        document.getElementById("result").innerHTML =
            `You were <b>${dist.toFixed(2)} km</b> away`;

        document.getElementById("playAgainBtn").style.display = "inline-block";
    };

    document.getElementById("playAgainBtn").onclick = function () {
        map.setView([20, 0], 2);
        if (guessMarker) map.removeLayer(guessMarker);
        if (correctMarker) map.removeLayer(correctMarker);
        document.getElementById("result").innerHTML = "";
        this.style.display = "none";
        loadStreetView();
    };

    // Start game
    loadStreetView();
</script>

</body>
</html>
